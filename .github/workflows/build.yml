name: Build V2XAmbilight.exe

on:
  push:
    branches: [master]
    paths:
      - '**.cs'
      - '**.csproj'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained exe
        run: |
          dotnet publish V2XAmbilight.csproj `
            -c Release -r win-x64 --self-contained `
            -p:PublishSingleFile=true -p:PublishReadyToRun=true `
            -o dist

      - name: Commit V2XAmbilight.exe
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          copy dist\V2XAmbilight.exe V2XAmbilight.exe
          git add V2XAmbilight.exe
          git diff --staged --quiet && echo "No changes to commit" || (git commit -m "ci: build V2XAmbilight.exe [skip ci]" && git push)
