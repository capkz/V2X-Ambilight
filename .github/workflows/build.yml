name: Build V2XAmbilight.exe

on:
  push:
    branches: [master]
    paths:
      - '**.cs'
      - '**.csproj'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish self-contained exe
        run: |
          dotnet publish V2XAmbilight.csproj `
            -c Release -r win-x64 `
            -p:PublishSingleFile=true `
            -o dist

      - name: Upload to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Build
          prerelease: true
          files: dist/V2XAmbilight.exe
